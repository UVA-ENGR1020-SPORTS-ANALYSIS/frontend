<svg xmlns="http://www.w3.org/2000/svg" width="512" height="479" viewBox="0 0 512 479" role="img" aria-labelledby="title desc">
  <title id="title">Tabletop basketball half court</title>
  <desc id="desc">Vector recreation of the numbered tabletop basketball court image.</desc>

  <defs>
    <style>
      .court-line { stroke: #111111; stroke-width: 2.3; stroke-linecap: square; fill: none; }
      .thin-line { stroke: #111111; stroke-width: 1.8; stroke-linecap: square; fill: none; }
      .blue-line { stroke: #4f5f9b; stroke-width: 2; stroke-linecap: round; fill: none; }
      .paint-line { stroke: #9d4630; stroke-width: 2.4; stroke-linecap: round; fill: none; }
      .zone-label { font: 30px Arial, Helvetica, sans-serif; fill: #000000; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <!-- Base court -->
  <rect x="1" y="1" width="510" height="477" fill="#ffffff" stroke="#111111" stroke-width="2.4"/>

  <!-- Two-point area -->
  <path
    d="M33 1 H479 V140 C448 219 365 294 256 294 C147 294 64 219 33 140 Z"
    fill="#ff9b87"
    stroke="#66665f"
    stroke-width="1.6"
  />

  <!-- Top side court boundaries -->
  <line x1="33" y1="1" x2="33" y2="140" class="court-line"/>
  <line x1="479" y1="1" x2="479" y2="140" class="court-line"/>
  <line x1="143.5" y1="1" x2="143.5" y2="6" class="thin-line"/>
  <line x1="368.5" y1="1" x2="368.5" y2="6" class="thin-line"/>

  <!-- Key / paint -->
  <rect x="175.5" y="1" width="161" height="193" fill="#9cacf9" stroke="#111111" stroke-width="2.2"/>
  <rect x="176.8" y="1" width="19" height="192" fill="#7d93f3" opacity="0.45"/>
  <rect x="316.5" y="1" width="19" height="192" fill="#7d93f3" opacity="0.45"/>
  <line x1="196.5" y1="1" x2="196.5" y2="193" stroke="#5363a1" stroke-width="2"/>
  <line x1="316.5" y1="1" x2="316.5" y2="193" stroke="#5363a1" stroke-width="2"/>

  <!-- Lane hash marks -->
  <line x1="171.5" y1="73" x2="175.5" y2="73" class="thin-line"/>
  <line x1="171.5" y1="84" x2="175.5" y2="84" class="thin-line"/>
  <line x1="171.5" y1="117" x2="175.5" y2="117" class="thin-line"/>
  <line x1="171.5" y1="150" x2="175.5" y2="150" class="thin-line"/>
  <line x1="336.5" y1="73" x2="340.5" y2="73" class="thin-line"/>
  <line x1="336.5" y1="84" x2="340.5" y2="84" class="thin-line"/>
  <line x1="336.5" y1="117" x2="340.5" y2="117" class="thin-line"/>
  <line x1="336.5" y1="150" x2="340.5" y2="150" class="thin-line"/>
  <line x1="207.5" y1="135" x2="212.5" y2="135" stroke="#5363a1" stroke-width="2"/>
  <line x1="300.5" y1="135" x2="305.5" y2="135" stroke="#5363a1" stroke-width="2"/>

  <!-- Hoop, backboard, and restricted area -->
  <path d="M216.5 42.5 V54.5 A39.5 39.5 0 0 0 295.5 54.5 V42.5" class="blue-line"/>
  <line x1="226.5" y1="42" x2="286.5" y2="42" class="blue-line"/>
  <line x1="256.5" y1="42.5" x2="256.5" y2="48.5" class="blue-line"/>
  <circle cx="256.5" cy="55.5" r="7.8" fill="none" stroke="#4f5f9b" stroke-width="1.8"/>

  <!-- Free throw circle -->
  <path d="M196.5 194 A59.5 59.5 0 0 1 315.5 194" fill="none" stroke="#344485" stroke-width="2.2" stroke-dasharray="12 12" stroke-linecap="butt"/>
  <path d="M196.5 194 A59.5 59.5 0 0 0 315.5 194" class="paint-line"/>
  <line x1="256" y1="194" x2="256" y2="294" class="court-line"/>

  <!-- Subtle source-image court tint line -->
  <line x1="337" y1="187" x2="424" y2="187" stroke="#ffb39d" stroke-width="1" opacity="0.55"/>

  <!-- Three-point / outside zone dividers -->
  <line x1="147" y1="268.5" x2="82" y2="478" class="court-line"/>
  <line x1="365" y1="268.5" x2="430" y2="478" class="court-line"/>
  <line x1="1" y1="287" x2="33" y2="287" class="court-line"/>
  <line x1="479" y1="287" x2="511" y2="287" class="court-line"/>

  <!-- Bottom hoop cropped by the image edge -->
  <path d="M195.5 478 A60.5 60.5 0 0 1 316.5 478" stroke="#2c2925" stroke-width="2.4" fill="none"/>
  <path d="M235.5 478 A20.5 20.5 0 0 1 276.5 478" stroke="#2c2925" stroke-width="2.4" fill="none"/>

  <!-- Zone numbers -->
  <text x="257" y="163" class="zone-label">1</text>
  <text x="106" y="117" class="zone-label">2</text>
  <text x="399" y="112" class="zone-label">3</text>
  <text x="59" y="272" class="zone-label">4</text>
  <text x="256" y="357" class="zone-label">5</text>
  <text x="454" y="272" class="zone-label">6</text>
</svg>
